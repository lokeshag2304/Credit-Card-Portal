<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Brand golden-orange outer overlapping petals -->
  <g stroke="#f7931e" stroke-width="4" fill="none" opacity="0.95">
    <ellipse cx="50" cy="50" rx="42" ry="18" transform="rotate(0 50 50)" />
    <ellipse cx="50" cy="50" rx="42" ry="18" transform="rotate(30 50 50)" />
    <ellipse cx="50" cy="50" rx="42" ry="18" transform="rotate(60 50 50)" />
    <ellipse cx="50" cy="50" rx="42" ry="18" transform="rotate(90 50 50)" />
    <ellipse cx="50" cy="50" rx="42" ry="18" transform="rotate(120 50 50)" />
    <ellipse cx="50" cy="50" rx="42" ry="18" transform="rotate(150 50 50)" />
  </g>
  <!-- Brand bright cyan-blue inner overlapping petals -->
  <g stroke="#00abec" stroke-width="3.5" fill="none" opacity="0.95">
    <ellipse cx="50" cy="50" rx="35" ry="15" transform="rotate(15 50 50)" />
    <ellipse cx="50" cy="50" rx="35" ry="15" transform="rotate(45 50 50)" />
    <ellipse cx="50" cy="50" rx="35" ry="15" transform="rotate(75 50 50)" />
    <ellipse cx="50" cy="50" rx="35" ry="15" transform="rotate(105 50 50)" />
    <ellipse cx="50" cy="50" rx="35" ry="15" transform="rotate(135 50 50)" />
    <ellipse cx="50" cy="50" rx="35" ry="15" transform="rotate(165 50 50)" />
  </g>
  <!-- Center focal circle -->
  <circle cx="50" cy="50" r="7" fill="#f7931e" stroke="#ffffff" stroke-width="1.5" />
</svg>